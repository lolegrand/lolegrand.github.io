<!DOCTYPE html>
<html>
  <script>

    document.addEventListener('DOMContentLoaded', init);

    function updateCanvas(corner)
    {
	      canvas = document.getElementById("myCanvas");
        canvas2d = canvas.getContext("2d");
	      canvas2d.beginPath();
	      canvas2d.arc(100, 100, 100, 0, corner*2*Math.PI, false);
        canvas2d.fillStyle = "red";
        canvas2d.stroke();
    }

    function onTimeUpdate(event) {
      percent = event.target.currentTime / event.srcElement.duration;
      updateCanvas(percent);
    }

    function init() {
      player = document.getElementById('player');
      player.addEventListener("timeupdate", onTimeUpdate);
      button = document.getElementById('playButton');
      button.addEventListener("click", function() {player.play()})
      updateCanvas(0.0);
    }

  </script>

  <head>
    <meta charset="utf-8">
  </head>
  <body>
    <h1> My audio device </h1>

    <canvas id="myCanvas" width="200" height="200"></canvas>

    <audio id="player" preload tabindex="0">
	    <source type="audio/wav" src="./audiofile/myAudio.wav" />
    </audio>

    <button id="playButton">Play</button>

  </body>
</html>
