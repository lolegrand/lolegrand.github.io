<html>
	<head>
		<script type="text/javascript">
			var a = 1;
			var b = "x";
			c = 3;
			function fonction1()
			{
				var a = 2;
				b = 3;
				c = 1;
				alert("fonction1: a vaut "+a+", b vaut "+b+" et c vaut "+c); 
			}
			function fonction2(d)
			{
				alert("fonction2 :a vaut "+a+", b vaut "+b+", c vaut "+c+" et d vaut "+d);
			}
			fonction1();
			fonction2(a);
		</script>
	</head>
	<body></body>
</html>
